<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GEMS - {% block title %}{% endblock %}</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0f1117; --sidebar:#141824; --card:#1a1f2e; --card2:#1e2436;
  --border:#2d3448; --border2:#374162;
  --green:#22c55e; --blue:#3b82f6; --yellow:#f59e0b; --red:#ef4444; --purple:#a855f7;
  --text:#e2e8f0; --muted:#64748b; --muted2:#94a3b8;
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}

/* ── Sidebar ─────────────────────────── */
.sidebar{width:230px;background:var(--sidebar);border-right:1px solid var(--border);
  position:fixed;top:0;left:0;height:100vh;z-index:100;display:flex;flex-direction:column}
.sb-logo{padding:22px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.sb-logo .icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--green),#16a34a);
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sb-logo .brand{font-weight:700;font-size:16px;letter-spacing:.05em}
.sb-logo .sub{font-size:10px;color:var(--muted);margin-top:1px}
.sb-nav{flex:1;padding:14px 10px;overflow-y:auto}
.sb-section{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;padding:10px 8px 5px}
.nav-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;
  color:var(--muted2);text-decoration:none;font-size:13px;font-weight:500;transition:.15s;
  border-left:2px solid transparent;margin-bottom:2px}
.nav-link .ni{font-size:17px;width:20px;text-align:center}
.nav-link:hover{background:rgba(255,255,255,.04);color:var(--text)}
.nav-link.active{background:rgba(34,197,94,.1);color:var(--green);border-left-color:var(--green)}
.sb-footer{padding:16px 14px;border-top:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#6366f1);
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.user-row .uname{font-size:13px;font-weight:600}
.user-row .urole{font-size:11px;color:var(--muted)}
.logout{display:block;text-align:center;padding:8px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);
  border-radius:7px;color:#f87171;font-size:12px;text-decoration:none;font-weight:600;transition:.15s}
.logout:hover{background:rgba(239,68,68,.2)}

/* ── Main ────────────────────────────── */
.main{margin-left:230px;flex:1;display:flex;flex-direction:column}
.topbar{background:var(--sidebar);border-bottom:1px solid var(--border);padding:14px 28px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:18px;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:16px}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.clock{font-size:13px;color:var(--muted);font-family:'Courier New',monospace;letter-spacing:.05em}
.content{padding:26px 28px;flex:1}

/* ── Cards ───────────────────────────── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.card-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}

/* ── Generator grid cards ────────────── */
.gen-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;margin-top:4px}
.gen-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.gen-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.gen-card.running::before{background:linear-gradient(90deg,var(--green),#4ade80)}
.gen-card.peak::before{background:linear-gradient(90deg,var(--yellow),#fbbf24)}
.gen-card.warn::before{background:linear-gradient(90deg,var(--red),#f87171)}
.gen-card.stop::before{background:var(--border)}
.gen-card.idle::before{background:var(--muted)}
.gen-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
.gen-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.gen-card-id{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.05em}
.gen-card-name{font-size:15px;font-weight:700;margin-top:3px}
.gen-card-site{font-size:12px;color:var(--muted);margin-top:2px}

/* Ring gauge */
.ring-wrap{position:relative;width:88px;height:88px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ring-center .pct{font-size:16px;font-weight:700;line-height:1}
.ring-center .lbl{font-size:9px;color:var(--muted);margin-top:2px}

.gen-power{font-size:28px;font-weight:800;line-height:1;margin:10px 0 4px}
.gen-power span{font-size:14px;font-weight:400;color:var(--muted)}
.gen-status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}
.badge-running{background:rgba(34,197,94,.15);color:var(--green)}
.badge-peak{background:rgba(245,158,11,.15);color:var(--yellow)}
.badge-warn{background:rgba(239,68,68,.15);color:var(--red)}
.badge-stop{background:rgba(100,116,139,.15);color:var(--muted2)}
.badge-idle{background:rgba(148,163,184,.1);color:var(--muted2)}
@keyframes badge-pulse{
  0%,100%{transform:scale(1);box-shadow:0 0 6px rgba(239,68,68,.7)}
  50%{transform:scale(1.15);box-shadow:0 0 12px rgba(239,68,68,.9)}
}

/* ── Detail page ─────────────────────── */
.detail-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:relative}
.metric-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:var(--radius) var(--radius) 0 0}
.mc-blue::after{background:var(--blue)}
.mc-green::after{background:var(--green)}
.mc-yellow::after{background:var(--yellow)}
.mc-red::after{background:var(--red)}
.mc-purple::after{background:var(--purple)}
.metric-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.metric-value{font-size:22px;font-weight:800;line-height:1}
.metric-unit{font-size:12px;color:var(--muted);margin-top:3px}

/* ── Period tabs ─────────────────────── */
.period-tabs{display:flex;gap:6px}
.ptab{padding:6px 16px;border-radius:7px;border:1px solid var(--border);background:transparent;
  color:var(--muted2);font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
.ptab:hover{border-color:var(--blue);color:var(--text)}
.ptab.active{background:var(--blue);border-color:var(--blue);color:#fff}

/* ── Progress bar ────────────────────── */
.prog{background:rgba(255,255,255,.06);border-radius:4px;height:5px;overflow:hidden;margin-top:6px}
.prog-bar{height:100%;border-radius:4px;transition:.5s}

/* ── Table ───────────────────────────── */
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 14px;text-align:left;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border)}
td{padding:11px 14px;border-bottom:1px solid rgba(45,52,72,.6)}
tr:last-child td{border:none}
tr:hover td{background:rgba(255,255,255,.015)}

/* ── Breadcrumb ──────────────────────── */
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);margin-bottom:20px}
.breadcrumb a{color:var(--muted2);text-decoration:none}
.breadcrumb a:hover{color:var(--text)}
.breadcrumb .sep{color:var(--border2)}

/* ── Buttons ─────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;
  border:1px solid var(--border);background:transparent;color:var(--text);font-size:13px;
  cursor:pointer;transition:.15s;text-decoration:none;font-weight:500}
.btn:hover{border-color:var(--blue);color:var(--blue)}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-primary:hover{background:#2563eb}

/* ── Toast ───────────────────────────── */
#toast{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast-item{background:#1e2436;border:1px solid var(--border);padding:12px 16px;border-radius:9px;
  font-size:13px;min-width:220px;box-shadow:0 4px 20px rgba(0,0,0,.4);animation:tslide .3s ease;
  border-left:3px solid var(--green)}
@keyframes tslide{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:none}}

/* ── Misc ────────────────────────────── */
@media(max-width:768px){
  .sidebar{width:56px}.sidebar .sb-logo .brand,.sidebar .sb-logo .sub,
  .nav-link span,.sb-footer .user-row .uname,.sb-footer .user-row .urole,
  .sb-section{display:none}.main{margin-left:56px}
}
@media(max-width:900px){.detail-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sb-logo">
    <div class="icon">⚡</div>
    <div>
      <div class="brand">GEMS</div>
      <div class="sub">발전기 관리 시스템</div>
    </div>
  </div>
  <nav class="sb-nav">
    <div class="sb-section">모니터링</div>
    <a href="/dashboard" class="nav-link {% if request.path=='/dashboard' %}active{% endif %}">
      <span class="ni">🏠</span><span>전체 대시보드</span></a>
    <a href="/alarms" class="nav-link {% if request.path=='/alarms' %}active{% endif %}" id="nav-alarms" style="position:relative">
      <span class="ni">🔔</span><span>알람 관리</span>
      <span id="alarm-badge" style="display:none;position:absolute;top:4px;right:8px;
        min-width:18px;height:18px;border-radius:50%;background:#ef4444;color:#fff;
        font-size:10px;font-weight:800;line-height:18px;text-align:center;padding:0 4px;
        box-shadow:0 0 6px rgba(239,68,68,.7);animation:badge-pulse 1.5s ease-in-out infinite">0</span>
    </a>
    <div class="sb-section">보고서</div>
    <a href="/report" class="nav-link {% if request.path.startswith('/report') %}active{% endif %}">
      <span class="ni">📋</span><span>발전기 보고서</span></a>
    <div class="sb-section">설정</div>
    <a href="/settings" class="nav-link {% if request.path=='/settings' %}active{% endif %}">
      <span class="ni">⚙</span><span>시스템 설정</span></a>
  </nav>
  <div class="sb-footer">
    <div class="user-row">
      <div class="avatar">{{ user.name[0] }}</div>
      <div>
        <div class="uname">{{ user.name }}</div>
        <div class="urole">{{ user.role }}</div>
      </div>
    </div>
    <a href="/logout" class="logout">🚪 로그아웃</a>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="topbar-title">{% block title_bar %}GEMS{% endblock %}</div>
    <div class="topbar-right">
      <span class="live-dot" title="실시간 연결"></span>
      <span class="clock" id="clk">--:--:--</span>
    </div>
  </header>
  <div class="content">{% block content %}{% endblock %}</div>
</div>

<div id="toast"></div>

<script>
(function tick(){
  document.getElementById('clk').textContent =
    new Date().toLocaleTimeString('ko-KR',{hour12:false});
  setTimeout(tick,1000);
})();

function toast(msg,color='var(--green)'){
  const w=document.getElementById('toast');
  const el=document.createElement('div');
  el.className='toast-item'; el.style.borderLeftColor=color; el.textContent=msg;
  w.appendChild(el); setTimeout(()=>el.remove(),3500);
}
Chart.defaults.color='#64748b';
Chart.defaults.borderColor='rgba(45,52,72,.7)';
Chart.defaults.font.family="'Segoe UI',system-ui,sans-serif";

// ── 알람 미처리 카운트 폴링 (30초마다) ──
function fetchAlarmCount(){
  fetch('/api/alarm_count').then(r=>r.json()).then(d=>{
    const badge = document.getElementById('alarm-badge');
    if(!badge) return;
    const n = d.unread || 0;
    if(n > 0){
      badge.textContent = n > 99 ? '99+' : n;
      badge.style.display = 'inline-block';
    } else {
      badge.style.display = 'none';
    }
  }).catch(()=>{});
}
fetchAlarmCount();
setInterval(fetchAlarmCount, 30000);
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
